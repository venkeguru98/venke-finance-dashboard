# Render.com Deployment Blueprint
# Push to GitHub, then connect repo at https://dashboard.render.com

services:
  - type: web
    name: venke-finance-dashboard
    runtime: node
    region: singapore
    plan: free

    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm run build

    startCommand: node server/dist/server.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: venke-finance-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://venke-finance-dashboard.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: venke-finance-db
    databaseName: venke_finance
    user: venke_admin
    plan: free
