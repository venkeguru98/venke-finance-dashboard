version: '3.9'

services:
  # ─── Main Application ────────────────────────────────────────────────────
  app:
    build: .
    container_name: venke-finance
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Persist SQLite database when not using PostgreSQL
      - ./database.sqlite:/app/database.sqlite
      # Persist uploaded files when not using Cloudinary
      - ./uploads:/app/uploads
      # Persist backups
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - venke-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Optional: Local PostgreSQL (for testing cloud DB locally) ────────────
  postgres:
    image: postgres:16-alpine
    container_name: venke-postgres
    restart: unless-stopped
    profiles:
      - postgres   # Only starts with: docker compose --profile postgres up
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-venke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-venke_pass}
      POSTGRES_DB: ${POSTGRES_DB:-venke_finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - venke-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venke}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  venke-net:
    driver: bridge
